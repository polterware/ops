name: Release macOS Bundles

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            asset_arch: aarch64
          - runner: macos-13
            target: x86_64-apple-darwin
            asset_arch: x64

    runs-on: ${{ matrix.runner }}

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Validate updater signing key
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required to generate macOS updater artifacts." >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS bundles
        run: pnpm exec tauri build --target ${{ matrix.target }} --bundles app,dmg

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          bundle_root="src-tauri/target/${{ matrix.target }}/release/bundle"
          app_archive="$(find "$bundle_root/macos" -name '*.app.tar.gz' -print -quit)"
          app_signature="$(find "$bundle_root/macos" -name '*.app.tar.gz.sig' -print -quit || true)"
          dmg_archive="$(find "$bundle_root/dmg" -name '*.dmg' -print -quit)"

          if [[ -z "$app_archive" ]]; then
            echo "Unable to find .app.tar.gz artifact under $bundle_root/macos" >&2
            exit 1
          fi

          if [[ -z "$dmg_archive" ]]; then
            echo "Unable to find .dmg artifact under $bundle_root/dmg" >&2
            exit 1
          fi

          output_dir="$RUNNER_TEMP/release-assets"
          mkdir -p "$output_dir"

          app_output="$output_dir/uru-macos-${{ matrix.asset_arch }}.app.tar.gz"
          dmg_output="$output_dir/uru-macos-${{ matrix.asset_arch }}.dmg"

          cp "$app_archive" "$app_output"
          cp "$dmg_archive" "$dmg_output"

          if [[ -n "$app_signature" ]]; then
            cp "$app_signature" "$output_dir/uru-macos-${{ matrix.asset_arch }}.app.tar.gz.sig"
          fi

          echo "output_dir=$output_dir" >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub release exists
        shell: bash
        run: |
          set -euo pipefail

          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --title "Uru $GITHUB_REF_NAME" \
              --notes "Automated macOS release for $GITHUB_REF_NAME." \
              || gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1
          fi

      - name: Upload release assets
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$GITHUB_REF_NAME" "${{ steps.assets.outputs.output_dir }}"/* --clobber
