name: Release macOS Bundles

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version override (ex: 0.1.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            asset_arch: aarch64
          - runner: macos-13
            target: x86_64-apple-darwin
            asset_arch: x64

    runs-on: ${{ matrix.runner }}

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Resolve release metadata
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            RELEASE_VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE:-}" == "tag" && -n "${GITHUB_REF_NAME:-}" ]]; then
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          else
            RELEASE_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version")"
          fi

          RELEASE_VERSION="${RELEASE_VERSION#v}"
          if [[ -z "$RELEASE_VERSION" ]]; then
            echo "Could not determine release version." >&2
            exit 1
          fi

          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Validate updater signing key
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required to generate macOS updater artifacts." >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS bundles
        run: pnpm exec tauri build --target ${{ matrix.target }} --bundles app

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          bundle_root="src-tauri/target/${{ matrix.target }}/release/bundle"
          app_archive="$(find "$bundle_root/macos" -name '*.app.tar.gz' -print -quit)"
          app_signature="$(find "$bundle_root/macos" -name '*.app.tar.gz.sig' -print -quit || true)"

          if [[ -z "$app_archive" ]]; then
            echo "Unable to find .app.tar.gz artifact under $bundle_root/macos" >&2
            exit 1
          fi

          output_dir="$RUNNER_TEMP/release-assets"
          mkdir -p "$output_dir"

          app_output="$output_dir/uru-macos-${{ matrix.asset_arch }}.app.tar.gz"

          cp "$app_archive" "$app_output"

          if [[ -n "$app_signature" ]]; then
            cp "$app_signature" "$output_dir/uru-macos-${{ matrix.asset_arch }}.app.tar.gz.sig"
          fi

          echo "output_dir=$output_dir" >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub release exists
        shell: bash
        run: |
          set -euo pipefail

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "Uru $RELEASE_VERSION" \
              --notes "Automated macOS release for $RELEASE_VERSION." \
              || gh release view "$RELEASE_TAG" >/dev/null 2>&1
          fi

      - name: Upload release assets
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" "${{ steps.assets.outputs.output_dir }}"/* --clobber
